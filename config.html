<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Claude Buddy Settings</title>
  <style>
    body { font-family: sans-serif; max-width: 480px; margin: 0 auto; padding: 24px 16px; background: #1a1a1a; color: #eee; }
    h2 { margin-top: 0; color: #fff; }
    label { display: block; margin-top: 16px; font-size: 14px; color: #aaa; }
    input { display: block; width: 100%; box-sizing: border-box; margin-top: 6px; padding: 10px; font-size: 16px; border: 1px solid #444; border-radius: 6px; background: #2a2a2a; color: #fff; }
    button { margin-top: 24px; width: 100%; padding: 14px; font-size: 16px; font-weight: bold; background: #4CAF50; color: #fff; border: none; border-radius: 8px; cursor: pointer; }
    button:active { background: #388E3C; }
    .hint { margin-top: 12px; font-size: 13px; color: #888; }
  </style>
</head>
<body>
  <h2>Claude Buddy</h2>

  <label>Server URL</label>
  <input id="url" type="url" placeholder="http://192.168.0.x:9876">
  <p class="hint">The IP address of your computer running <code>server.js</code>. Find it with <code>hostname -I</code>.</p>

  <button onclick="save()">Save</button>

  <script>
    // Read current value passed in hash
    var params = {};
    location.hash.slice(1).split('&').forEach(function(p) {
      var kv = p.split('=');
      params[decodeURIComponent(kv[0])] = decodeURIComponent(kv[1] || '');
    });
    if (params.url) document.getElementById('url').value = params.url;

    function save() {
      var url = document.getElementById('url').value.trim();
      location.href = 'pebblejs://close#' + encodeURIComponent(JSON.stringify({ url: url }));
    }
  </script>
</body>
</html>
